<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Scoreboard Animata con VAR</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: transparent;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        /* === CONFIGURAZIONE GENERALE CONTAINER === */
        .wrapper {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 580px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        /* Scoreboard Principale */
        .scoreboard {
            width: 100%;
            height: 45px;
            background: #111116;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            border-bottom: 2px solid #222;
        }

        /* Blocchi Squadre */
        .team {
            display: flex;
            align-items: center;
            width: 40%;
            height: 100%;
            padding: 0 15px;
            box-sizing: border-box;
        }

        .team.home {
            justify-content: flex-end;
            text-align: right;
        }

        /* Ospiti: Logo a sinistra, Nome a destra */
        .team.away {
            justify-content: flex-start;
            text-align: left;
        }

        .team span {
            font-size: 16px;
            font-weight: 700;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .logo {
            width: 28px;
            height: 28px;
            object-fit: contain;
        }

        /* Margini interni per i loghi */
        .team.home .logo { margin-left: 12px; }
        .team.away .logo { margin-right: 12px; } /* Margine a destra perché il nome segue il logo */

        /* Blocco Centrale del Risultato */
        .center-score {
            display: flex;
            width: 20%;
            height: 100%;
            background: #2a2a35;
            border-left: 1px solid #333;
            border-right: 1px solid #333;
        }

        .score {
            width: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 800;
            color: #fff;
        }

        /* === RIQUADRO DEL TIMER SOTTO I MINUTI === */
        .timer-box {
            width: 80px;
            height: 22px;
            background: #111116;
            border: 1px solid #2a2a35;
            border-top: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            color: #ffcc00;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        /* === CONTENITORE ANIMAZIONI (GOAL & VAR) === */
        #goalAnimation {
            width: 100%;
            height: 32px;
            margin-top: 5px;
            display: none; 
            justify-content: center;
            align-items: center;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        #goalAnimation.active-goal, 
        #goalAnimation.active-var {
            display: flex; 
        }

        #goalAnimation.active-goal { background: #e50c1b; } 
        #goalAnimation.active-var { background: #ffcc00; }  

        #track {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
