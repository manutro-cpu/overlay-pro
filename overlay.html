<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="scoreboard">
        <div class="team"> <img class="logo" id="logo1"> <span id="team1">ALCIGNE</span> </div>
        <div class="center">
            <div class="score"> <span id="score1">0</span> - <span id="score2">0</span> </div>
            <div id="timer">00:00</div>
        </div>
        <div class="team"> <span id="team2">VIKI HATZ</span> <img class="logo" id="logo2"> </div>
    </div>
    <div id="goalAnimation">
        <div id="track"> <img id="ball" src="pallone.png">
            <div id="goalText">GOOOOOAL</div>
        </div>
    </div>
       <script>function triggerGoalAnimation() {
            const goalDiv = document.getElementById("goalAnimation");
            
            // Aggiunge la classe che fa partire l'animazione
            goalDiv.classList.add("active");

            // Rimuove la classe dopo che l'animazione è finita (es. dopo 3 secondi)
            // Imposta il tempo (3000ms) in base a quanto dura la tua animazione nel CSS
            setTimeout(() => {
                goalDiv.classList.remove("active");
            }, 3000); </script> 
        }</body>

</html>
