<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Scoreboard Animata con VAR</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: transparent;
            font-family: Arial, sans-serif;
        }

        .scoreboard {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 850px;
            height: 100px;
            background: rgba(0, 0, 20, 0.75);
            border: 3px solid #00bfff;
            border-radius: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            color: white;
            box-shadow: 0 0 25px #00bfff;
            z-index: 10;
        }

        .team {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 32px;
            font-weight: bold;
        }

        .logo {
            width: 60px;
            height: 60px;
        }

        .center { text-align: center; }

        .score {
            font-size: 46px;
            font-weight: bold;
            color: #ff2b2b;
        }

        #timer {
            font-size: 28px;
            margin-top: 5px;
        }

        /* === CONTENITORE ANIMAZIONI (GOAL & VAR) === */
        #goalAnimation {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none; 
            justify-content: center;
            align-items: center;
            z-index: 999;  
        }

        #goalAnimation.active-goal, 
        #goalAnimation.active-var {
            display: flex; 
        }

        /* Sfondo scuro per il Gol, Sfondo Giallo/Arancio per la VAR */
        #goalAnimation.active-goal { background: rgba(0, 0, 0, 0.3); }
        #goalAnimation.active-var { background: rgba(255, 68, 68, 0.2); }

        #track {
            position: relative;
            width: 800px;
            height: 200px;
            overflow: hidden;
        }

        #ball {
            position: absolute;
            width: 180px;
            top: 50%;
            transform: translateY(-50%);
            left: -200px; /* Fuori dallo schermo di base */
        }

        #goalText,#varText {
            position: absolute;
            top: 50%;
            left: 50px;
            transform: translateY(-50%);
            font-size: 120px;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            width: 0;
        }

        #goalText {
            color: black;
            text-shadow: 0 0 20px red, 0 0 35px blue;
        }

        #varText {
            color: #ffcc00;
            text-shadow: 0 0 20px black, 0 0 35px red;
        }

        /* --- ATTIVAZIONE ANIMAZIONE GOAL --- */
        #goalAnimation.active-goal #ball {
            animation: moveBall 2.5s linear forwards;
        }
        #goalAnimation.active-goal #goalText {
            animation: revealText 2.5s linear forwards;
        }

        /* --- ATTIVAZIONE ANIMAZIONE VAR (Niente palla, solo testo) --- */
        #goalAnimation.active-var #varText {
            animation: revealText 2.5s ease-in-out forwards;
        }

        @keyframes moveBall {
            0% { left: 0; }
            100% { left: 650px; }
        }

        @keyframes revealText {
            0% { width: 0; }
            100% { width: 750px; }
        }
    </style>
</head>
<body>

    <div class="scoreboard">
        <div class="team"> 
            <img class="logo" id="logo1"> 
            <span id="team1">ALCIGNE</span> 
        </div>
        <div class="center">
            <div class="score"> <span id="score1">0</span> - <span id="score2">0</span> </div>
            <div id="timer">00:00</div>
        </div>
        <div class="team"> 
            <span id="team2">VIKI HATZ</span> 
            <img class="logo" id="logo2"> 
        </div>
    </div>

    <div id="goalAnimation">
        <div id="track"> 
            <img id="ball" src="pallone.png">
            <div id="goalText">GOOOOOAL</div>
            <div id="varText">❌GOAL(VAR)</div>
        </div>
    </div>

    <script src="script.js"></script>
    
    <script>
        const ws = new WebSocket("wss://" + location.host);
        
        let prevScore1 = null;
        let prevScore2 = null;

        ws.onmessage = (msg) => {
            const d = JSON.parse(msg.data);

            // Gestione dei trigger grafici basati sul cambio di punteggio
            if (prevScore1 !== null && prevScore2 !== null) {
                // CASO 1: Il punteggio sale -> GOAL!
                if (d.score1 > prevScore1 || d.score2 > prevScore2) {
                    triggerAnimation("active-goal");
                } 
                // CASO 2: Il punteggio scende -> VAR / GOL ANNULLATO!
                else if (d.score1 < prevScore1 || d.score2 < prevScore2) {
                    triggerAnimation("active-var");
                }
            }

            // Aggiorna lo scoreboard reale sul browser
            document.getElementById("score1").innerText = d.score1;
            document.getElementById("score2").innerText = d.score2;
            document.getElementById("timer").innerText = d.timer;
            document.getElementById("team1").innerText = d.team1;
            document.getElementById("team2").innerText = d.team2;
            document.getElementById("logo1").src = d.logo1;
            document.getElementById("logo2").src = d.logo2;

            // Salva lo stato attuale per il prossimo controllo
            prevScore1 = d.score1;
            prevScore2 = d.score2;
        };

        function triggerAnimation(className) {
            const animContainer = document.getElementById("goalAnimation");
            
            // Rimuove tutte le classi per resettare lo stato di palla e testi
            animContainer.classList.remove("active-goal", "active-var");
            void animContainer.offsetWidth; // Trucco di reflow per forzare il riavvio dei @keyframes CSS
            
            // Attiva la classe specifica richiesta (active-goal o active-var)
            animContainer.classList.add(className);

            // Nasconde l'animazione dopo 3.5 secondi complessi
            setTimeout(() => {
                animContainer.classList.remove(className);
            }, 3500); 
        }
    </script>
</body>
</html>
