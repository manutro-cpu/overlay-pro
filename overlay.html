<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <title>Scoreboard Animata</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: transparent;
            font-family: Arial, sans-serif;
        }

        .scoreboard {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 850px;
            height: 100px;
            background: rgba(0, 0, 20, 0.75);
            border: 3px solid #00bfff;
            border-radius: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            color: white;
            box-shadow: 0 0 25px #00bfff;
            z-index: 10;
        }

        .team {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 32px;
            font-weight: bold;
        }

        .logo {
            width: 60px;
            height: 60px;
        }

        .center {
            text-align: center;
        }

        .score {
            font-size: 46px;
            font-weight: bold;
            color: #ff2b2b;
        }

        #timer {
            font-size: 28px;
            margin-top: 5px;
        }

        /* === SEZIONE GOAL ANIMATION === */
        #goalAnimation {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none; /* Nascosto di default */
            justify-content: center;
            align-items: center;
            z-index: 999;  /* Sopra alla scoreboard */
            background: rgba(0, 0, 0, 0.2); /* Opzionale: scurisce leggermente lo sfondo durante il gol */
        }

        /* Questa classe viene attivata dal JavaScript quando cambia il punteggio */
        #goalAnimation.active {
            display: flex; 
        }

        #track {
            position: relative;
            width: 800px;
            height: 200px;
            overflow: hidden;
        }

        #ball {
            position: absolute;
            width: 180px;
            top: 50%;
            transform: translateY(-50%);
            left: 0;
            /* L'animazione partirà SOLO quando il contenitore diventa visibile */
            animation: moveBall 2.5s linear forwards;
        }

        #goalText {
            position: absolute;
            top: 50%;
            left: 50px;
            transform: translateY(-50%);
            font-size: 120px;
            font-weight: bold;
            color: black;
            text-shadow: 0 0 20px red, 0 0 35px blue;
            white-space: nowrap;
            overflow: hidden;
            width: 0;
            /* L'animazione partirà SOLO quando il contenitore diventa visibile */
            animation: revealText 2.5s linear forwards;
        }

        @keyframes moveBall {
            0% { left: 0; }
            100% { left: 650px; }
        }

        @keyframes revealText {
            0% { width: 0; }
            100% { width: 700px; }
        } /* Graffa corretta e chiusa */
    </style>
</head>

<body>

    <div class="scoreboard">
        <div class="team"> 
            <img class="logo" id="logo1"> 
            <span id="team1">ALCIGNE</span> 
        </div>
        <div class="center">
            <div class="score"> <span id="score1">0</span> - <span id="score2">0</span> </div>
            <div id="timer">00:00</div>
        </div>
        <div class="team"> 
            <span id="team2">VIKI HATZ</span> 
            <img class="logo" id="logo2"> 
        </div>
    </div>

    <div id="goalAnimation">
        <div id="track"> 
            <img id="ball" src="pallone.png">
            <div id="goalText">GOOOOOAL</div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        const ws = new WebSocket("wss://" + location.host);
        
        // Variabili di controllo per monitorare i cambi di punteggio
        let prevScore1 = null;
        let prevScore2 = null;

        ws.onmessage = (msg) => {
            const d = JSON.parse(msg.data);

            // Controlla se i punteggi precedenti esistevano già (evita l'animazione al primo avvio)
            if (prevScore1 !== null && prevScore2 !== null) {
                // Se lo score 1 o lo score 2 sono aumentati, attiva l'animazione
                if (d.score1 > prevScore1 || d.score2 > prevScore2) {
                    triggerGoal();
                }
            }

            // Aggiorna i dati nel DOM
            document.getElementById("score1").innerText = d.score1;
            document.getElementById("score2").innerText = d.score2;
            document.getElementById("timer").innerText = d.timer;
            document.getElementById("team1").innerText = d.team1;
            document.getElementById("team2").innerText = d.team2;
            document.getElementById("logo1").src = d.logo1;
            document.getElementById("logo2").src = d.logo2;

            // Memorizza i punteggi attuali per il prossimo controllo
            prevScore1 = d.score1;
            prevScore2 = d.score2;
        };

        // Funzione che gestisce l'accensione e lo spegnimento dell'animazione
        function triggerGoal() {
            const animContainer = document.getElementById("goalAnimation");
            
            // Applica la classe CSS che imposta 'display: flex' e fa partire i @keyframes
            animContainer.classList.add("active");

            // Rimuove la classe dopo 3 secondi (3000 millisecondi) per resettare tutto
            setTimeout(() => {
                animContainer.classList.remove("active");
            }, 3000); 
        }
    </script>
</body>

</html>
