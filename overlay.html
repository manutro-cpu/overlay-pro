<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Scoreboard Animata con VAR</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: transparent;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; /* Font più pulito e moderno */
        }

        /* === CONFIGURAZIONE GENERALE SCOREBOARD (Stile Sky) === */
        .scoreboard {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 580px; /* Ridotto per non tagliare nei bordi dello streaming */
            height: 45px; /* Più stretto e compatto */
            background: #111116; /* Antracite molto scuro */
            display: flex;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            z-index: 10;
            border-bottom: 2px solid #222;
        }

        /* Blocchi Squadre */
        .team {
            display: flex;
            align-items: center;
            width: 40%; /* Spazio proporzionato alle scritte */
            height: 100%;
            padding: 0 10px;
            box-sizing: border-box;
        }

        .team.home {
            justify-content: flex-end;
            text-align: right;
        }

        .team.away {
            justify-content: flex-start;
            text-align: left;
        }

        .team span {
            font-size: 16px;
            font-weight: 700;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .logo {
            width: 28px;
            height: 28px;
            object-fit: contain;
        }

        .team.home .logo { margin-left: 10px; }
        .team.away .logo { margin-right: 10px; }

        /* Blocco Centrale: Risultato e Tempo */
        .center {
            display: flex;
            width: 20%;
            height: 100%;
            background: #1a1a24; /* Leggermente staccato dal resto */
            border-left: 1px solid #333;
            border-right: 1px solid #333;
        }

        .score-box {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .score {
            width: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 800;
            color: #fff;
            background: #2a2a35; /* Sfondo dedicato per i numeri */
        }
        
        /* Colore rosso Sky per il punteggio se preferisci, altrimenti lascialo bianco */
        #score1 { color: #fff; } 
        #score2 { color: #fff; }

        .timer-box {
            width: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            font-weight: 700;
            color: #ffcc00; /* Giallo tipico per il tempo */
            background: #111116;
        }

        /* === CONTENITORE ANIMAZIONI (GOAL & VAR) === */
        #goalAnimation {
            position: absolute;
            top: 67px; /* Subito sotto la barra principale */
            left: 50%;
            transform: translateX(-50%);
            width: 580px;
            height: 35px;
            display: none; 
            justify-content: center;
            align-items: center;
            z-index: 9;  
            overflow: hidden;
        }

        #goalAnimation.active-goal, 
        #goalAnimation.active-var {
            display: flex; 
        }

        /* Banner di notifica compatti stile Sky */
        #goalAnimation.active-goal { background: #e50c1b; } /* Rosso Sky Gol */
        #goalAnimation.active-var { background: #ffcc00; }  /* Giallo VAR */

        #track {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #ball {
            position: absolute;
            width: 25px;
            height: 25px;
            left: -50px;
            display: none; /* Rimosso l'effetto palla gigante per pulizia, puoi riattivarlo togliendo 'none' */
        }

        #goalText, #varText {
            font-size: 16px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: none;
        }

        #goalText { color: #ffffff; }
        #varText { color: #000000; }

        #goalAnimation.active-goal #goalText { display: block; animation: pulseText 0.5s ease infinite alternate; }
        #goalAnimation.active-var #varText { display: block; }

        @keyframes pulseText {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }
    </style>
</head>
<body>

    <div class="scoreboard">
        <div class="team home"> 
            <span id="team1">ALCIGNE</span> 
            <img class="logo" id="logo1" src=""> 
        </div>
        
        <div class="center">
            <div class="score-box">
                <div class="score" id="score1">0</div>
                <div class="score" id="score2">0</div>
            </div>
        </div>
        <div class="timer-box" id="timer">00:00</div>

        <div class="team away"> 
            <img class="logo" id="logo2" src=""> 
            <span id="team2">VIKI HATZ</span> 
        </div>
    </div>

    <div id="goalAnimation">
        <div id="track"> 
            <img id="ball" src="pallone.png">
            <div id="goalText">⚽ GOOOOOAL ⚽</div>
            <div id="varText">🖥️ VAR - GOAL ANNULLATO</div>
        </div>
    </div>

    <script src="script.js"></script>
    
    <script>
        const ws = new WebSocket("wss://" + location.host);
        
        let prevScore1 = null;
        let prevScore2 = null;

        ws.onmessage = (msg) => {
            const d = JSON.parse(msg.data);

            if (prevScore1 !== null && prevScore2 !== null) {
                if (d.score1 > prevScore1 || d.score2 > prevScore2) {
                    triggerAnimation("active-goal");
                } 
                else if (d.score1 < prevScore1 || d.score2 < prevScore2) {
                    triggerAnimation("active-var");
                }
            }

            document.getElementById("score1").innerText = d.score1;
            document.getElementById("score2").innerText = d.score2;
            document.getElementById("timer").innerText = d.timer;
            document.getElementById("team1").innerText = d.team1;
            document.getElementById("team2").innerText = d.team2;
            document.getElementById("logo1").src = d.logo1;
            document.getElementById("logo2").src = d.logo2;

            prevScore1 = d.score1;
            prevScore2 = d.score2;
        };

        function triggerAnimation(className) {
            const animContainer = document.getElementById("goalAnimation");
            
            animContainer.classList.remove("active-goal", "active-var");
            void animContainer.offsetWidth; 
            
            animContainer.classList.add(className);

            setTimeout(() => {
                animContainer.classList.remove(className);
            }, 3500); 
        }
    </script>
</body>
</html>
